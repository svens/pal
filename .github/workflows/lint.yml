name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-format-22 clang-tidy-22 libc++-18-dev libc++abi-18-dev
          sudo ln -sf /usr/bin/clang-format-22 /usr/bin/clang-format
          sudo ln -sf /usr/bin/clang-tidy-22 /usr/bin/clang-tidy
          sudo ln -sf /usr/bin/run-clang-tidy-22 /usr/bin/run-clang-tidy

      - run: ninja format-check
      - run: ninja tidy
