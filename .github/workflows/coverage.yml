name: Coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  coverage:
    name: Coverage report
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y llvm libc++-18-dev libc++abi-18-dev

      - name: Build, test, and generate coverage
        run: ninja coverage

      - name: Export coverage to lcov
        run: |
          llvm-cov export .build/linux-clang-coverage/pal_test \
            -instr-profile=.build/linux-clang-coverage/coverage.profdata \
            --format=lcov \
            "-ignore-filename-regex=.*(test|bench)\.cpp$" \
            "-ignore-filename-regex=.*/test\.(cpp|hpp)$" \
            "-ignore-filename-regex=.*\.build/.*" \
            > coverage.lcov

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
