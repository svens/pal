name: Coverage

on:
  push:
    branches: [main]
  pull_request:

jobs:
  coverage:
    name: Coverage report
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y llvm libc++-18-dev libc++abi-18-dev

      - name: Configure
        run: cmake --preset linux-clang-coverage

      - name: Build
        run: cmake --build --preset linux-clang-coverage

      - name: Test
        run: |
          LLVM_PROFILE_FILE=pal_test-%p.profraw \
          .build/linux-clang-coverage/pal_test --skip-benchmarks \
            --reporter console \
            --reporter junit::out=junit.xml

      - name: Generate report
        run: |
          llvm-profdata merge -sparse pal_test-*.profraw -o coverage.profdata
          llvm-cov export .build/linux-clang-coverage/pal_test \
            -instr-profile=coverage.profdata \
            --format=lcov \
            "-ignore-filename-regex=.*(test|bench)\.cpp$" \
            "-ignore-filename-regex=.*/test\.(cpp|hpp)$" \
            "-ignore-filename-regex=.*\.build/.*" \
            > coverage.lcov

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: junit.xml
          report_type: test_results
          token: ${{ secrets.CODECOV_TOKEN }}
