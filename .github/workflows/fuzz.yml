name: Fuzz

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fuzz:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get install -y clang-18
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 18
      - run: ninja fuzz-check
