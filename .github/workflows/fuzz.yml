name: Fuzz

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fuzz:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-22 libc++-22-dev libc++abi-22-dev
          sudo ln -sf /usr/bin/clang++-22 /usr/bin/clang++
      - run: ninja fuzz-check
